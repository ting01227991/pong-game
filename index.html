<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pong Game</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1>Pong Game</h1>
        <div class="scoreboard">
            <div class="score">
                <h2>Player</h2>
                <p id="playerScore">0</p>
            </div>
            <div class="score">
                <h2>Computer</h2>
                <p id="computerScore">0</p>
            </div>
        </div>
        <canvas id="pongCanvas" width="800" height="400"></canvas>
        <div class="instructions">
            <p><strong>Controls:</strong> Mouse Y position or Arrow Keys (↑/↓) to move the left paddle</p>
            <p><strong>Goal:</strong> Bounce the ball past the computer's paddle to score!</p>
        </div>
    </div>
    <script src="game.js"></script>
</body>
</html>
